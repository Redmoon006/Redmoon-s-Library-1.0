<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redmoon's Library 1.0</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg redmoon-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('home') }}">
            <span class="brand-moon">🌙</span>
            <span>Redmoon's Library</span>
        </a>

        <button class="navbar-toggler text-white border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item">
                    <a class="nav-link nav-pill {% if request.endpoint == 'home' %}active-pill{% endif %}" href="{{ url_for('home') }}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-pill {% if request.endpoint == 'admin' %}active-pill-yellow{% endif %}" href="{{ url_for('admin') }}">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
</main>

<footer class="text-center py-3 mt-4 redmoon-footer">
    <small>© 2026 Redmoon's Library 1.0 | Sistem Informasi Perpustakaan Sederhana</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
