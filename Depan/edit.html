{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-4 text-center">Edit Buku</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">ID Buku</label>
                        <input type="text" class="form-control" value="{{ buku['id_buku'] }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Judul Buku</label>
                        <input type="text" name="judul_buku" class="form-control" value="{{ buku['judul_buku'] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Penerbit</label>
                        <input type="text" name="penerbit" class="form-control" value="{{ buku['penerbit'] }}" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">Update</button>
                        <a href="{{ url_for('admin') }}" class="btn btn-secondary">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
