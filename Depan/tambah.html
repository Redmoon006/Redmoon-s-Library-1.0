{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-4 text-center">Tambah Buku</h2>

                <form method="POST" action="{{ url_for('tambah') }}">
                    <div class="mb-3">
                        <label class="form-label">ID Buku</label>
                        <input type="text" name="id_buku" class="form-control" placeholder="Contoh: BK001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Judul Buku</label>
                        <input type="text" name="judul_buku" class="form-control" placeholder="Masukkan judul buku" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Penerbit</label>
                        <input type="text" name="penerbit" class="form-control" placeholder="Masukkan nama penerbit" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Simpan</button>
                        <a href="{{ url_for('admin') }}" class="btn btn-secondary">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
