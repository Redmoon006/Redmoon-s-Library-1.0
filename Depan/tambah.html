{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="form-card">
            <div class="form-card-body">
                <h2 class="form-title text-center mb-4">Tambah Buku</h2>

                {% if error %}
                <div class="alert alert-danger rounded-4">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">ID Buku</label>
                        <input type="text" name="id_buku" class="form-control premium-input" placeholder="Contoh: BK001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Judul Buku</label>
                        <input type="text" name="judul_buku" class="form-control premium-input" placeholder="Masukkan judul buku" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Penerbit</label>
                        <input type="text" name="penerbit" class="form-control premium-input" placeholder="Masukkan nama penerbit" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-redmoon btn-lg rounded-pill">Simpan</button>
                        <a href="{{ url_for('admin') }}" class="btn btn-light btn-lg rounded-pill">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
