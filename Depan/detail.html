{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="form-card">
            <div class="form-card-body">
                <h2 class="form-title text-center mb-4">Detail Buku</h2>

                <div class="mb-3">
                    <label class="form-label fw-semibold">ID Buku</label>
                    <div class="detail-box">{{ buku['id_buku'] }}</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Judul Buku</label>
                    <div class="detail-box">{{ buku['judul_buku'] }}</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Penerbit</label>
                    <div class="detail-box">{{ buku['penerbit'] }}</div>
                </div>

                <div class="d-grid gap-2">
                    <a href="{{ url_for('home') }}" class="btn btn-search btn-lg rounded-pill">Kembali ke Home</a>
                    <a href="{{ url_for('admin') }}" class="btn btn-light btn-lg rounded-pill">Kembali ke Admin</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
