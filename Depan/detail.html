{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-4 text-center">Detail Buku</h2>

                <div class="mb-3">
                    <label class="form-label fw-bold">ID Buku</label>
                    <div class="form-control bg-light">{{ buku['id_buku'] }}</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Judul Buku</label>
                    <div class="form-control bg-light">{{ buku['judul_buku'] }}</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Penerbit</label>
                    <div class="form-control bg-light">{{ buku['penerbit'] }}</div>
                </div>

                <div class="d-grid gap-2">
                    <a href="{{ url_for('home') }}" class="btn btn-primary">Kembali ke Home</a>
                    <a href="{{ url_for('admin') }}" class="btn btn-secondary">Kembali ke Admin</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
